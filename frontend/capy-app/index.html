<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Capybara</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app-shell" aria-label="Capybara Workbench">
    <header class="topbar" data-native-drag="true" data-section="top-chrome">
      <div class="brand-lockup">
        <div class="brand-stamp" aria-hidden="true">C</div>
        <div>
          <div class="brand-title">Capybara</div>
          <div class="brand-subtitle">Demo Project / Canvas</div>
        </div>
      </div>
      <nav class="project-tabs" aria-label="Project views">
        <button class="view-tab active" type="button">画布</button>
        <button class="view-tab" type="button">主视觉</button>
        <button class="view-tab" type="button">网页</button>
        <button class="view-tab" type="button">Brand Kit</button>
      </nav>
      <div class="top-actions">
        <button class="icon-action" type="button" aria-label="Command">⌘K</button>
        <button class="icon-action" type="button" aria-label="Evidence">✓</button>
      </div>
    </header>

    <section class="workbench" data-section="workbench">
      <section class="canvas-panel canvas" data-section="canvas-host" aria-label="Canvas host">
        <div class="canvas-toolbar" data-component="canvas-toolbar">
          <span class="tool-pill active">Select</span>
          <span class="tool-pill">Node</span>
          <span class="tool-pill">Link</span>
          <span class="tool-pill muted" id="canvas-status">Canvas loading</span>
        </div>
        <canvas id="capy-canvas" data-component="canvas-runtime" tabindex="0"></canvas>
        <div id="poster-overlay-layer" class="poster-overlay-layer" data-component="poster-overlay-layer"></div>
        <div id="node-label-layer" class="node-label-layer" data-component="node-label-layer"></div>
        <div class="mini-map" data-component="mini-map">
          <span></span><span></span><span></span>
        </div>
      </section>

      <aside class="planner planner-shell" data-section="planner-chat" aria-label="Planner chat">
        <section class="planner-context" data-section="planner-context" id="planner-context">
          <div class="context-eyebrow">当前画布上下文</div>
          <div class="context-title" id="context-title">No selection</div>
          <div class="context-meta" id="context-meta">选择左侧节点后，Planner 会围绕该对象工作。</div>
        </section>

        <section class="canvas-tool" data-section="canvas-image-tool" aria-label="Canvas image generation tool">
          <div class="canvas-tool-head">
            <div>
              <div class="context-eyebrow">Canvas tool</div>
              <div class="tool-title">生成图片并放到画布</div>
            </div>
            <span class="tool-status" id="image-tool-status">idle</span>
          </div>
          <textarea id="image-tool-prompt" rows="5" aria-label="Image prompt" placeholder="Scene: ...
Subject: ...
Important details: ...
Use case: ...
Constraints: ..."></textarea>
          <div class="tool-actions">
            <button class="tool-button secondary" id="image-tool-dry-run" type="button">Dry run</button>
            <button class="tool-button primary" id="image-tool-live" type="button">Generate</button>
          </div>
          <div class="tool-meta" id="image-tool-meta">Dry run does not spend credits. Live performs one provider call.</div>
        </section>

        <section class="chat-pane" aria-label="Chat">
          <div class="chat-header">
            <div>
              <div class="chat-title" id="chat-title">Capybara Planner</div>
              <div class="chat-subtitle" id="chat-subtitle">Claude Code / Codex CLI</div>
            </div>
            <div class="run-controls">
              <span class="run-status" id="run-status">idle</span>
              <button class="stop-run" id="stop-run" type="button">Stop</button>
            </div>
          </div>
          <div class="conversation-strip" data-component="conversation-strip">
            <button class="new-chat" id="new-chat" type="button">New chat</button>
            <div class="conversation-list" id="conversation-list"></div>
          </div>
          <div class="message-list" id="message-list"></div>
          <form class="composer" id="composer">
            <textarea id="prompt" rows="3" placeholder="Ask Planner about the selected canvas node"></textarea>
            <div class="composer-actions">
              <div class="runtime-config">
                <select id="provider" aria-label="Provider">
                  <option value="claude">Claude</option>
                  <option value="codex">Codex</option>
                </select>
                <input id="cwd" aria-label="Working directory" placeholder="/Users/Zhuanz/workspace/capybara">
                <input id="model" aria-label="Model" placeholder="model">
                <select id="effort" aria-label="Effort">
                  <option value="">effort</option>
                  <option value="minimal">minimal</option>
                  <option value="low">low</option>
                  <option value="medium">medium</option>
                  <option value="high">high</option>
                  <option value="xhigh">xhigh</option>
                </select>
                <select id="policy" aria-label="Permission policy">
                  <option value="">policy</option>
                </select>
                <select id="sandbox" aria-label="Sandbox">
                  <option value="">sandbox</option>
                  <option value="read-only">read only</option>
                  <option value="workspace-write">workspace write</option>
                  <option value="danger-full-access">danger full access</option>
                </select>
                <label class="write-code-inline">
                  <input id="write-code" type="checkbox">
                  <span>Write code</span>
                </label>
              </div>
              <button class="send" type="submit">Send</button>
            </div>
            <details class="advanced-config">
              <summary>Runtime options</summary>
              <div class="advanced-grid">
                <label>System<textarea id="system-prompt" rows="2"></textarea></label>
                <label>Append system<textarea id="append-system-prompt" rows="2"></textarea></label>
                <label>Developer<textarea id="developer-instructions" rows="2"></textarea></label>
                <label>Add dirs<input id="add-dirs"></label>
                <label>Allowed tools<input id="allowed-tools"></label>
                <label>Disallowed tools<input id="disallowed-tools"></label>
                <label>MCP config<input id="mcp-config"></label>
                <label>Codex provider<input id="model-provider"></label>
                <label>Approval reviewer<select id="approvals-reviewer"><option value="">reviewer</option><option value="user">user</option><option value="auto_review">auto review</option></select></label>
                <label>Reasoning summary<select id="reasoning-summary"><option value="">summary</option><option value="auto">auto</option><option value="concise">concise</option><option value="detailed">detailed</option><option value="none">none</option></select></label>
                <label>Output schema<input id="output-schema"></label>
                <label class="toggle"><input id="bare" type="checkbox"><span>Claude bare mode</span></label>
                <label class="toggle"><input id="search" type="checkbox"><span>Codex web search</span></label>
                <input id="service-tier" aria-label="Service tier" placeholder="service tier">
              </div>
            </details>
            <div class="runtime-foot" id="runtime-foot">SQLite store: waiting for shell</div>
          </form>
        </section>
      </aside>
    </section>
  </main>
  <script type="module" src="./script.js"></script>
</body>
</html>
