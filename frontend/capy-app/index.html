<!doctype html>
<html lang="zh-CN" data-theme="arc-glass">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Capybara</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="bg-wash" aria-hidden="true"></div>
  <div class="bg-noise" aria-hidden="true"></div>

  <main class="app-shell" aria-label="Capybara Workbench">

    <header class="topbar" data-native-drag="true" data-section="top-chrome">
      <div class="brand-lockup">
        <span class="brand-stamp" aria-hidden="true">C</span>
        <div class="brand-text">
          <div class="brand-title">Capybara</div>
          <div class="brand-subtitle">Demo Project / Canvas</div>
        </div>
      </div>
      <nav class="project-tabs" aria-label="Project views">
        <button class="view-tab active" type="button" data-view="canvas">画布</button>
        <button class="view-tab" type="button" data-view="hero">主视觉</button>
        <button class="view-tab" type="button" data-view="web">网页</button>
        <button class="view-tab" type="button" data-view="brand">Brand Kit</button>
      </nav>
      <div class="top-actions">
        <button class="icon-action" type="button" id="cmdk-trigger" aria-label="Command palette">⌘K</button>
        <button class="icon-action" type="button" aria-label="Evidence">✓</button>
      </div>
    </header>

    <section class="workbench" data-section="workbench">

      <section class="canvas-panel" data-section="canvas-host" aria-label="Canvas host">
        <div class="canvas-grid" aria-hidden="true"></div>
        <canvas id="capy-canvas" data-component="canvas-runtime" tabindex="0"></canvas>
        <div id="poster-overlay-layer" class="poster-overlay-layer" data-component="poster-overlay-layer"></div>
        <div id="node-label-layer" class="node-label-layer" data-component="node-label-layer"></div>

        <div class="canvas-toolbar" data-component="canvas-toolbar">
          <button class="seg active" type="button" data-tool="select">Select</button>
          <button class="seg" type="button" data-tool="node">Node</button>
          <button class="seg" type="button" data-tool="link">Link</button>
          <span class="seg-info" id="canvas-status">Canvas loading</span>
        </div>

        <div class="canvas-bottom" data-component="canvas-bottom">
          <button class="bt active" type="button" data-tool="cursor" aria-label="Select"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l10 5-4.5 1.5L7 13z"/></svg></button>
          <button class="bt" type="button" data-tool="hand" aria-label="Hand"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M5 9V4a1.2 1.2 0 0 1 2.4 0V8M7.4 8V3a1.2 1.2 0 0 1 2.4 0v6M9.8 9V5a1.2 1.2 0 0 1 2.4 0v6.5c0 2.2-1.8 3.5-3.6 3.5h-2c-1 0-1.7-.4-2.4-1.1L2 11.5l1-1c.4-.4 1-.5 1.5-.2L5 11"/></svg></button>
          <span class="bt-sep"></span>
          <button class="bt" type="button" data-tool="rect" aria-label="Rectangle"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2.5" y="3.5" width="11" height="9" rx="1.5"/></svg></button>
          <button class="bt" type="button" data-tool="circle" aria-label="Circle"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8" cy="8" r="5.5"/></svg></button>
          <button class="bt" type="button" data-tool="tri" aria-label="Triangle"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M8 3l5.5 9.5h-11z"/></svg></button>
          <button class="bt" type="button" data-tool="diamond" aria-label="Diamond"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M8 2.5l5.5 5.5L8 13.5 2.5 8z"/></svg></button>
          <span class="bt-sep"></span>
          <button class="bt" type="button" data-tool="line" aria-label="Line"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 13L13 3"/></svg></button>
          <button class="bt" type="button" data-tool="arrow" aria-label="Arrow"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 13L13 3M9 3h4v4"/></svg></button>
          <button class="bt" type="button" data-tool="curve" aria-label="Curve"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 9c2-3 4-3 6 0s4 3 6 0"/></svg></button>
          <button class="bt" type="button" data-tool="pen" aria-label="Pen"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 14l3-1 8-8-2-2-8 8z"/></svg></button>
          <span class="bt-sep"></span>
          <button class="bt" type="button" data-tool="text" aria-label="Text"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 4h10M8 4v9M5 13h6"/></svg></button>
          <button class="bt" type="button" data-tool="sticky" aria-label="Sticky"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 3h10v8l-3 2H3z"/><path d="M10 13v-2h3"/></svg></button>
          <button class="bt" type="button" data-tool="frame" aria-label="Frame"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M5 2v12M11 2v12M2 5h12M2 11h12"/></svg></button>
        </div>

        <div class="mini-map" data-component="mini-map">
          <span></span><span></span><span></span>
        </div>
      </section>

      <aside class="planner-shell" data-section="planner-chat" aria-label="Planner chat">

        <header class="chat-head">
          <div class="conversation-strip" data-component="conversation-strip">
            <div class="conversation-list" id="conversation-list"></div>
            <button class="new-chat" id="new-chat" type="button" title="新会话">+</button>
          </div>
          <div class="run-controls">
            <span class="run-status" id="run-status">idle</span>
            <button class="stop-run" id="stop-run" type="button" aria-label="Stop run">×</button>
          </div>
        </header>

        <section class="planner-context" data-section="planner-context" id="planner-context">
          <span class="context-eyebrow" id="context-eyebrow">CONTEXT</span>
          <span class="context-title" id="context-title">No selection</span>
          <span class="context-meta" id="context-meta">选择左侧节点 · Planner 围绕该对象工作</span>
        </section>

        <div class="chat-stream" id="message-list" data-section="chat-stream"></div>

        <form class="composer" id="composer">
          <div class="composer-input">
            <textarea id="prompt" rows="2" placeholder="继续聊 · 或 @ 选中画布节点"></textarea>
          </div>
          <div class="composer-foot">
            <button class="config-summary" id="config-summary" type="button" aria-haspopup="dialog">claude · medium · bypass</button>
            <button class="send" type="submit">Send</button>
          </div>
          <div class="runtime-foot" id="runtime-foot">SQLite store: waiting for shell</div>
        </form>
      </aside>
    </section>
  </main>

  <dialog class="config-dialog" id="config-dialog" aria-label="Runtime configuration">
    <div class="config-dialog-inner">
      <header class="config-dialog-head">
        <div>
          <span class="context-eyebrow">RUNTIME</span>
          <span class="config-dialog-title">Conversation 配置</span>
        </div>
        <button class="cmd-close" type="button" id="config-dialog-close" aria-label="Close">esc</button>
      </header>
      <div class="advanced-grid">
        <label><span>Provider</span><select id="provider"><option value="claude">Claude</option><option value="codex">Codex</option></select></label>
        <label><span>cwd</span><input id="cwd" placeholder="/Users/.../capybara"></label>
        <label><span>Model</span><input id="model" placeholder="model"></label>
        <label><span>Effort</span><select id="effort"><option value="">effort</option><option value="minimal">minimal</option><option value="low">low</option><option value="medium">medium</option><option value="high">high</option><option value="xhigh">xhigh</option></select></label>
        <label><span>Policy</span><select id="policy"><option value="">policy</option></select></label>
        <label><span>Sandbox</span><select id="sandbox"><option value="">sandbox</option><option value="read-only">read only</option><option value="workspace-write">workspace write</option><option value="danger-full-access">danger full</option></select></label>
        <label class="grid-toggle"><input id="write-code" type="checkbox"><span>Write code</span></label>
        <label class="grid-wide"><span>System</span><textarea id="system-prompt" rows="2"></textarea></label>
        <label class="grid-wide"><span>Append system</span><textarea id="append-system-prompt" rows="2"></textarea></label>
        <label class="grid-wide"><span>Developer</span><textarea id="developer-instructions" rows="2"></textarea></label>
        <label><span>Add dirs</span><input id="add-dirs"></label>
        <label><span>Allowed tools</span><input id="allowed-tools"></label>
        <label><span>Disallowed tools</span><input id="disallowed-tools"></label>
        <label><span>MCP config</span><input id="mcp-config"></label>
        <label><span>Codex provider</span><input id="model-provider"></label>
        <label><span>Approval reviewer</span><select id="approvals-reviewer"><option value="">reviewer</option><option value="user">user</option><option value="auto_review">auto review</option></select></label>
        <label><span>Reasoning summary</span><select id="reasoning-summary"><option value="">summary</option><option value="auto">auto</option><option value="concise">concise</option><option value="detailed">detailed</option><option value="none">none</option></select></label>
        <label class="grid-wide"><span>Output schema</span><input id="output-schema"></label>
        <label class="grid-toggle"><input id="bare" type="checkbox"><span>Claude bare</span></label>
        <label class="grid-toggle"><input id="search" type="checkbox"><span>Codex search</span></label>
        <label><span>Service tier</span><input id="service-tier" placeholder="service tier"></label>
      </div>
      <footer class="config-dialog-foot">
        <button class="tool-button primary" type="button" id="config-dialog-done">完成</button>
      </footer>
    </div>
  </dialog>

  <dialog class="cmd-palette" id="cmd-palette" aria-label="Command palette">
    <div class="cmd-palette-inner">
      <header class="cmd-palette-head">
        <input class="cmd-search" id="cmd-search" placeholder="搜索命令" autocomplete="off">
        <button class="cmd-close" type="button" id="cmd-close" aria-label="Close">esc</button>
      </header>

      <div class="cmd-list" id="cmd-list">
        <button class="cmd-row" data-cmd="open-image-tool" type="button">
          <span class="cmd-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M8 2.5l5.5 5.5L8 13.5 2.5 8z"/></svg></span>
          <span class="cmd-text">
            <span class="cmd-name">Generate canvas image</span>
            <span class="cmd-desc">为选中节点旁边或下一空位生成图片节点</span>
          </span>
          <span class="cmd-shortcut">↩</span>
        </button>
        <button class="cmd-row" data-cmd="dark-mode" type="button">
          <span class="cmd-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M8 2.5a5.5 5.5 0 0 0 0 11 5.5 5.5 0 0 1 0-11z" fill="currentColor"/></svg></span>
          <span class="cmd-text">
            <span class="cmd-name">Toggle canvas dark mode</span>
            <span class="cmd-desc">切换 WASM canvas 暗色显示</span>
          </span>
        </button>
        <button class="cmd-row" data-cmd="seed-demo" type="button">
          <span class="cmd-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8" cy="8" r="5.5"/><path d="M8 5v6M5 8h6"/></svg></span>
          <span class="cmd-text">
            <span class="cmd-name">Seed demo nodes</span>
            <span class="cmd-desc">画布为空时填默认 4 节点</span>
          </span>
        </button>
      </div>

      <section class="cmd-tool" data-section="canvas-image-tool" id="canvas-image-tool" hidden>
        <header class="cmd-tool-head">
          <button class="cmd-back" id="cmd-tool-back" type="button" aria-label="Back to commands">‹</button>
          <div class="cmd-tool-title">
            <span class="context-eyebrow">CANVAS TOOL</span>
            <span class="tool-title">生成图片并放到画布</span>
          </div>
          <span class="tool-status" id="image-tool-status">idle</span>
        </header>
        <textarea id="image-tool-prompt" rows="6" aria-label="Image prompt" placeholder="Scene: ...&#10;Subject: ...&#10;Important details: ...&#10;Use case: ...&#10;Constraints: ..."></textarea>
        <div class="tool-actions">
          <button class="tool-button secondary" id="image-tool-dry-run" type="button">Dry run</button>
          <button class="tool-button primary" id="image-tool-live" type="button">Generate</button>
        </div>
        <div class="tool-meta" id="image-tool-meta">Dry run does not spend credits. Live performs one provider call.</div>
      </section>
    </div>
  </dialog>

  <script type="module" src="./script.js"></script>
</body>
</html>
